version: "3.9"

services:
  bakal:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "${PORT:-3001}:3001"
    volumes:
      - db-data:/app/backend/data
      - uploads:/app/backend/uploads
    env_file:
      - backend/.env
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/api/health').then(r=>{if(!r.ok)throw 1})"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  db-data:
  uploads:
